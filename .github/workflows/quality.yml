name: Fenjue quality gates

on:
  push:
    paths:
      - "a-stock-signal-lab/**"
      - ".github/workflows/quality.yml"
  pull_request:
    paths:
      - "a-stock-signal-lab/**"
      - ".github/workflows/quality.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: a-stock-signal-lab

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --disable-pip-version-check ruff
      - run: python -m ruff check fenjue scripts tests --select E9,F63,F7,F82

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --disable-pip-version-check -e .
      - run: python -m unittest discover -s tests -v

  migration-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --disable-pip-version-check -e .
      - run: python scripts/ci_migration_dry_run.py

  fixture-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --disable-pip-version-check -e .
      - run: python scripts/ci_fixture_replay.py

  shadow-baseline-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --disable-pip-version-check -e .
      - run: python scripts/ci_shadow_baseline_regression.py
